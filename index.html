<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#000;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  z-index:10;
}

.box{
  background:rgba(255,182,193,0.95);
  padding:25px;
  border-radius:20px;
}

button{
  padding:15px 25px;
  border:none;
  border-radius:30px;
  background:#ff6f9c;
  color:white;
  font-size:18px;
  margin-top:15px;
}

/* CONTENEDOR */
#main{
  display:none;
  position:relative;
}

/* IMAGEN REAL */
#invitation-img{
  width:100%;
  height:auto;
  display:block;
}

/* BOTONES INVISIBLES */
.btn{
  position:absolute;
  width:30%;
  height:8%;
  bottom:5%;
}

/* POSICIÓN BOTONES */
#map{ left:5%; }
#confirm{ left:35%; }
#raffle{ left:65%; }

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<div id="intro">
  <div class="box">
    <h2>💖 ¡Bienvenido! 💖</h2>
    <p>
      Con mucho amor queremos invitarte a este hermoso momento 💕
    </p>
    <button onclick="openInvitation()">Abrir Invitación</button>
  </div>
</div>

<!-- INVITACIÓN -->
<div id="main">

  <!-- IMAGEN -->
  <img id="invitation-img" src="fondo.jpg">

  <!-- BOTONES -->
  <div id="map" class="btn" onclick="map()"></div>
  <div id="confirm" class="btn" onclick="confirm()"></div>
  <div id="raffle" class="btn" onclick="raffle()"></div>

</div>

<script>

// ABRIR INVITACIÓN
function openInvitation(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";

  let music = document.getElementById("music");
  music.play().catch(()=>{});
}

// MAPA
function map(){
  window.open("https://maps.google.com/?q=1621+Bridge+Rd+SE");
}

// WHATSAPP
function confirm(){
  window.open("https://wa.me/17272837263?text=Confirmo%20mi%20asistencia");
}

// SORTEO
const gifts = [
"https://www.amazon.com/dp/B07BJGW9P3",
"https://www.amazon.com/dp/B0GBZVYM3N",
"https://www.amazon.com/dp/B09Y69HJKJ"
];

let used = JSON.parse(localStorage.getItem("gifts")) || [];

function raffle(){
  let available = gifts.filter(g => !used.includes(g));

  if(available.length === 0){
    alert("Ya no hay regalos disponibles 🎁");
    return;
  }

  let selected = available[Math.floor(Math.random()*available.length)];
  used.push(selected);

  localStorage.setItem("gifts", JSON.stringify(used));

  alert("🎉 ¡Te tocó un regalo!");
  window.open(selected);
}

</script>

</body>
</html>
